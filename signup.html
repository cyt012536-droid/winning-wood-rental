<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - Winning Wood Limited</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Winning Wood Limited</div>
        <nav>
            <a href="index.html">首頁</a>
            <a href="login.html">登入</a>
        </nav>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="auth-container" style="background: #f9f9f9; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 20px;">註冊帳號</h2>
            <form id="signup-form">
                <div class="input-group" style="margin-bottom: 15px;">
                    <label for="email" style="display: block; margin-bottom: 5px;">電子郵件</label>
                    <input type="email" id="email" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                <div class="input-group" style="margin-bottom: 20px;">
                    <label for="password" style="display: block; margin-bottom: 5px;">密碼 (最少 6 個字元)</label>
                    <input type="password" id="password" minlength="6" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                <button type="submit" class="btn btn-large" style="width: 100%;">立即註冊</button>
                
                <p id="error-message" style="color: red; display: none; margin-top: 15px; text-align: center; font-size: 14px; background-color: #fee; padding: 10px; border-radius: 4px;"></p>
                <p id="success-message" style="color: green; display: none; margin-top: 15px; text-align: center; font-size: 14px; background-color: #eafcf1; padding: 10px; border-radius: 4px;">註冊成功！正在為您導向登入頁面...</p>
            </form>
            <p style="text-align: center; margin-top: 20px;">已經有帳號？ <a href="login.html" style="color: #cba135;">按此登入</a></p>
        </div>
    </main>

    <!-- 引入 Supabase JS 與初始化檔案 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
    
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止表單重整
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const submitBtn = e.target.querySelector('button');
            
            // 重置訊息與按鈕狀態
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            submitBtn.textContent = '處理中...';
            submitBtn.disabled = true;

            try {
                // 【修復重點】：這裡改為 supabaseClient (對應 supabase-init.js 裡面的設定)
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) {
                    throw error;
                }

                // 註冊成功
                successMsg.style.display = 'block';
                document.getElementById('signup-form').reset();
                
                // 成功後 2 秒自動跳轉至登入頁面
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                // 捕捉錯誤並顯示在畫面上，按鈕恢復原狀
                errorMsg.textContent = '註冊失敗：' + err.message;
                errorMsg.style.display = 'block';
            } finally {
                // 不論成功或失敗，都把按鈕解鎖
                submitBtn.textContent = '立即註冊';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
