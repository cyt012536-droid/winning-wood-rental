<!DOCTYPE html>  
<html lang="zh-TW">  
<head>  
    <meta charset="UTF-8">  
    <title>註冊 - Winning Wood</title>  
    <link rel="stylesheet" href="style.css">  
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
</head>  
<body>  
    <header>  
        <a href="index.html" class="logo">Winning Wood</a>  
        <nav><a href="login.html">返回登入</a></nav>  
    </header>  
  
    <div class="container" style="max-width: 500px;">  
        <div class="card">  
            <h2 style="text-align: center; margin-bottom: 20px;">建立企業帳戶</h2>  
            <div id="msgBox" class="alert"></div>  
              
            <form id="signupForm">  
                <div class="form-group">  
                    <label>電子郵件 (Email)</label>  
                    <input type="email" id="email" required>  
                </div>  
                <div class="form-group">  
                    <label>密碼 (Password)</label>  
                    <input type="password" id="password" required minlength="6">  
                </div>  
                <div class="form-group">  
                    <label>聯絡人姓名 (Full Name)</label>  
                    <input type="text" id="fullName" required>  
                </div>  
                <div class="form-group">  
                    <label>聯絡電話 (Phone)</label>  
                    <input type="text" id="phone" required>  
                </div>  
                <div class="form-group">  
                    <label>公司名稱 (Company Name)</label>  
                    <input type="text" id="companyName" required>  
                </div>  
                <button type="submit" class="btn-primary" style="width: 100%;">註冊並登入</button>  
            </form>  
        </div>  
    </div>  
  
    <script src="supabase-init.js"></script>  
    <script>  
        document.getElementById('signupForm').addEventListener('submit', async (e) => {  
            e.preventDefault();  
            const msgBox = document.getElementById('msgBox');  
            msgBox.className = 'alert';   
            msgBox.innerText = '處理中，請稍候...';  
  
            const email = document.getElementById('email').value;  
            const password = document.getElementById('password').value;  
            const full_name = document.getElementById('fullName').value;  
            const phone = document.getElementById('phone').value;  
            const company_name = document.getElementById('companyName').value;  
  
            try {  
                // 1. 建立 Auth 帳號  
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({  
                    email, password  
                });  
                if (authError) throw authError;  
  
                const user = authData.user;  
                if (user) {  
                    // 2. 寫入客戶資料表  
                    const { error: dbError } = await supabaseClient.from('customers').insert([  
                        { auth_user_id: user.id, full_name, phone, company_name }  
                    ]);  
                      
                    if (dbError) throw dbError;  
  
                    msgBox.className = 'alert success';  
                    msgBox.innerText = '註冊成功！系統將自動為您轉跳...';  
                      
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);  
                }  
            } catch (err) {  
                msgBox.className = 'alert error';  
                msgBox.innerText = '註冊失敗：' + err.message;  
            }  
        });  
    </script>  
</body>  
</html>
